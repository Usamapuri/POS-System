# Interpolation reads variables from a `.env` file in this directory (Compose default).
# Set POSTGRES_HOST_PORT=5433 in `.env` if host port 5432 is already in use.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pos-postgres-dev
    environment:
      POSTGRES_DB: ${DB_NAME:-pos_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - pos-network

  # Golang Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: pos-backend-dev
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-pos_system}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-debug}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - pos-network
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
    container_name: pos-frontend-dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
      # Set DOCKER_FORCE_NPM_CI=1 in .env once if node_modules is stale (e.g. missing @dnd-kit).
      DOCKER_FORCE_NPM_CI: ${DOCKER_FORCE_NPM_CI:-0}
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - pos-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_dev_data:

networks:
  pos-network:
    driver: bridge

